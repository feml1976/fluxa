spring:
  application:
    name: fluxa

  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fluxa_db}
    username: ${DB_USERNAME:fluxa_user}
    password: ${DB_PASSWORD:fluxa_local_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public
        jdbc:
          time_zone: America/Bogota
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    time-zone: America/Bogota
    date-format: yyyy-MM-dd'T'HH:mm:ssXXX
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

fluxa:
  jwt:
    secret: ${JWT_SECRET:cambiar-este-secret-en-produccion-minimo-64-caracteres-obligatorio}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}       # 15 minutos
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 días

  security:
    max-login-attempts: 5
    login-lockout-minutes: 15

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

  notification:
    alert-days-before: ${NOTIFICATION_ALERT_DAYS:3}
    from-name: "FLUXA — Gestión Financiera"
    scheduler-cron: "0 0 8 * * *"    # 8:00 AM diario (zona America/Bogota)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.fml.fluxa: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
