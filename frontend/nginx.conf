server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Compresión gzip para activos de texto
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml text/javascript image/svg+xml;

    # Proxy al backend — evita CORS en producción
    # El servicio "backend" es resuelto por el DNS interno de Docker Compose
    location /api/ {
        proxy_pass          http://backend:8080/api/;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 5s;
    }

    # Cache agresivo para assets versionados por Vite (hash en el nombre)
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache moderado para imágenes e íconos
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # SPA routing — todas las rutas no encontradas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
