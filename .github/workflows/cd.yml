name: CD — Docker Build & Push

# Se dispara solo cuando el workflow CI termina exitosamente en main
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:

  docker:
    name: Build & Push imágenes Docker
    runs-on: ubuntu-latest

    # Solo continuar si CI pasó (no si falló o fue cancelado)
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: write   # necesario para publicar en ghcr.io

    steps:
      - name: Checkout en el commit que disparó el CI
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Imagen Backend ────────────────────────────────────────
      - name: Build y push — fluxa-backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fluxa-backend:latest
            ghcr.io/${{ github.repository_owner }}/fluxa-backend:${{ github.event.workflow_run.head_sha }}
          # Cache de capas entre builds para acelerar construcciones futuras
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Imagen Frontend ───────────────────────────────────────
      - name: Build y push — fluxa-frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fluxa-frontend:latest
            ghcr.io/${{ github.repository_owner }}/fluxa-frontend:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen del despliegue
        run: |
          echo "## Imágenes publicadas" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/fluxa-backend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`ghcr.io/${{ github.repository_owner }}/fluxa-frontend:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.event.workflow_run.head_sha }}\`" >> $GITHUB_STEP_SUMMARY
